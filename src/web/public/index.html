<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgentDots — Unified AI Agent Config Manager</title>
    <link rel="stylesheet" href="style.css">
    <!-- Vue 3 Global Build (prod) — must load before app.js module -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>
    <div id="app" class="layout" v-cloak>
        <aside class="sidebar">
            <header>
                <h1>AgentDots</h1>
            </header>
            <nav>
                <ul>
                    <li><a href="#agents" :class="{ active: currentSection === 'agents' }" @click="currentSection = 'agents'">Agents</a></li>
                    <li><a href="#rules" :class="{ active: currentSection === 'rules' }" @click="currentSection = 'rules'">Rules</a></li>
                    <li><a href="#skills" :class="{ active: currentSection === 'skills' }" @click="currentSection = 'skills'">Skills</a></li>
                    <li><a href="#mcp" :class="{ active: currentSection === 'mcp' }" @click="currentSection = 'mcp'">MCP</a></li>
                    <li><a href="#commands" :class="{ active: currentSection === 'commands' }" @click="currentSection = 'commands'">Commands</a></li>
                    <li><a href="#updates" :class="{ active: currentSection === 'updates' }" @click="currentSection = 'updates'">Updates</a></li>
                    <li><a href="#settings" :class="{ active: currentSection === 'settings' }" @click="currentSection = 'settings'">Settings</a></li>
                </ul>
            </nav>
        </aside>
        <main>
            <header class="main-header">
                <h2>{{ pageTitle }}</h2>
            </header>
            <section id="content">
                <agents-page
                    v-if="currentSection === 'agents'"
                    :agents="agents"
                    :loading="loading"
                    :usage="usage"
                    :installing-agents="installingAgents"
                    :install-results="installResults"
                    @select-agent="openAgent($event)"
                    @install-agent="installAgent($event)"
                ></agents-page>
                <updates-page v-else-if="currentSection === 'updates'"></updates-page>
                <rules-page
                    v-else-if="currentSection === 'rules'"
                    :agents="rulesAgents"
                ></rules-page>
                <skills-page
                    v-else-if="currentSection === 'skills'"
                    :agents="skillsAgents"
                ></skills-page>
                <mcp-page
                    v-else-if="currentSection === 'mcp'"
                    :agents="mcpAgents"
                ></mcp-page>
                <div v-else class="placeholder">
                    <p>Section <strong>{{ currentSection }}</strong> is coming soon.</p>
                </div>
            </section>
        </main>

        <!-- Agent Detail Modal -->
        <agent-modal
            v-if="selectedAgent"
            :agent="selectedAgent"
            @close="selectedAgent = null"
        ></agent-modal>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
